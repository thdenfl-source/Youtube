<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Youtube Downloader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="title">Youtube Downloader</h1>

      <!-- 링크 입력 박스 + Down 버튼 -->
      <section class="card">
        <form id="search-form" class="search">
          <input
            id="url-input"
            type="url"
            inputmode="url"
            autocomplete="off"
            placeholder="YouTube 링크를 붙여넣으세요"
            required
          />
          <button type="submit" id="down-btn" title="링크 분석">
            <svg
              class="down-icon"
              viewBox="0 0 24 24"
              width="22"
              height="22"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M12 3a1 1 0 0 1 1 1v9.59l3.3-3.3a1 1 0 1 1 1.4 1.42l-5 5a1 1 0 0 1-1.4 0l-5-5a1 1 0 1 1 1.4-1.42l3.3 3.3V4a1 1 0 0 1 1-1Z"
              />
              <path
                fill="currentColor"
                d="M5 19a1 1 0 0 1 0-2h14a1 1 0 1 1 0 2H5Z"
              />
            </svg>
            <span class="down-label">Down</span>
            <span class="spinner" hidden></span>
          </button>
        </form>
        <p id="error" class="error" role="alert" hidden></p>
      </section>
    </main>

    <!-- 화질 / MP3 선택 창 (모달) -->
    <div id="modal" class="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" data-close aria-label="닫기">×</button>

        <div class="meta">
          <img id="thumb" class="thumb" alt="" />
          <div class="meta-text">
            <h2 id="modal-title"></h2>
            <p id="video-author" class="author"></p>
            <p id="video-duration" class="duration"></p>
          </div>
        </div>

        <label class="select-label" for="format-select">화질 / 형식 선택</label>
        <select id="format-select"></select>

        <button id="go-btn" class="go">
          <span class="btn-label">Go</span>
          <span class="spinner" hidden></span>
        </button>

        <div id="progress-wrap" class="progress-wrap" hidden>
          <div class="progress-track">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
          <div class="progress-info">
            <span id="progress-phase">준비 중</span>
            <span id="progress-pct">0%</span>
          </div>
        </div>

        <p id="go-hint" class="hint" hidden>
          완료되면 기기의 다운로드 폴더에 저장됩니다.
        </p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
