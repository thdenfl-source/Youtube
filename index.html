<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Youtube Downloader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="title">Youtube Downloader</h1>

      <!-- 링크 입력 박스 + Down 버튼 -->
      <section class="card">
        <form id="search-form" class="search">
          <input
            id="url-input"
            type="url"
            inputmode="url"
            autocomplete="off"
            placeholder="YouTube 링크를 붙여넣으세요"
            required
          />
          <button type="submit" id="down-btn" title="링크 분석">
            <svg
              class="down-icon"
              viewBox="0 0 24 24"
              width="22"
              height="22"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M12 3a1 1 0 0 1 1 1v9.59l3.3-3.3a1 1 0 1 1 1.4 1.42l-5 5a1 1 0 0 1-1.4 0l-5-5a1 1 0 1 1 1.4-1.42l3.3 3.3V4a1 1 0 0 1 1-1Z"
              />
              <path
                fill="currentColor"
                d="M5 19a1 1 0 0 1 0-2h14a1 1 0 1 1 0 2H5Z"
              />
            </svg>
            <span class="down-label">Down</span>
            <span class="spinner" hidden></span>
          </button>
        </form>
        <p id="error" class="error" role="alert" hidden></p>
      </section>
    </main>

    <!-- 화질 / MP3 선택 창 (모달) -->
    <div id="modal" class="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div
        class="modal-box"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <button class="modal-close" data-close aria-label="닫기">×</button>

        <h2 id="modal-title" class="modal-title">다운로드 옵션</h2>

        <div class="tabs" role="tablist">
          <button class="tab active" data-mode="video" type="button" role="tab">
            🎬 영상 (MP4)
          </button>
          <button class="tab" data-mode="audio" type="button" role="tab">
            🎵 음원 (MP3)
          </button>
        </div>

        <div id="video-panel" class="panel">
          <label class="select-label" for="quality-select">화질 선택</label>
          <select id="quality-select">
            <option value="max">최고 화질</option>
            <option value="1080" selected>1080p</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
            <option value="360">360p</option>
          </select>
        </div>

        <div id="audio-panel" class="panel" hidden>
          <p class="audio-note">
            최고 음질 오디오를 추출해 <strong>MP3</strong> 로 변환합니다.
          </p>
        </div>

        <button id="go-btn" class="go" type="button">
          <span class="btn-label">Go</span>
          <span class="spinner" hidden></span>
        </button>

        <p id="status" class="status" hidden></p>

        <details class="advanced">
          <summary>고급 설정 (API 인스턴스)</summary>
          <p class="advanced-note">
            다운로드는 공개 <a href="https://cobalt.tools" target="_blank"
              rel="noopener">cobalt</a> 인스턴스가 처리합니다. 동작하지 않으면
            <a href="https://instances.cobalt.best" target="_blank"
              rel="noopener">instances.cobalt.best</a> 에서 살아있는 주소로
            바꿔보세요.
          </p>
          <input
            id="instance-input"
            type="url"
            inputmode="url"
            autocomplete="off"
            placeholder="https://cobalt-api.example.com"
          />
        </details>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
